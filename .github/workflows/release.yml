name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        working-directory: cli
        run: cargo test

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: bfcode-linux-amd64
            client_artifact: bfcode_client-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: bfcode-linux-arm64
            client_artifact: bfcode_client-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: bfcode-darwin-amd64
            client_artifact: bfcode_client-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: bfcode-darwin-arm64
            client_artifact: bfcode_client-darwin-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build release
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      # ── macOS: Import certificate ─────────────────────────────────────
      - name: Import codesigning certificate
        if: runner.os == 'macOS'
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          # Decode .p12 from base64
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Resolve signing identity
          CERT_INFO=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" || true)
          if [ -n "$CERT_INFO" ]; then
            CERT_ID=$(echo "$CERT_INFO" | head -1 | awk -F'"' '{print $2}')
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV
            echo "Found certificate: $CERT_ID"
          else
            echo "::warning::No Developer ID Application certificate found, using ad-hoc signing"
            echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV
          fi

      # ── macOS: Sign binaries ──────────────────────────────────────────
      - name: Codesign macOS binaries
        if: runner.os == 'macOS'
        run: |
          BFCODE="cli/target/${{ matrix.target }}/release/bfcode"
          CLIENT="cli/target/${{ matrix.target }}/release/bfcode-client"

          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            "$BFCODE"

          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            "$CLIENT"

          echo "Signed bfcode:"
          codesign -dv --verbose=2 "$BFCODE" 2>&1 | head -5
          echo "Signed bfcode-client:"
          codesign -dv --verbose=2 "$CLIENT" 2>&1 | head -5

      # ── macOS: Notarize binaries ──────────────────────────────────────
      - name: Notarize macOS binaries
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          BFCODE="cli/target/${{ matrix.target }}/release/bfcode"
          CLIENT="cli/target/${{ matrix.target }}/release/bfcode-client"

          # Notarization requires zip archives
          ditto -c -k "$BFCODE" "$RUNNER_TEMP/bfcode-notarize.zip"
          ditto -c -k "$CLIENT" "$RUNNER_TEMP/client-notarize.zip"

          echo "Submitting bfcode for notarization..."
          xcrun notarytool submit "$RUNNER_TEMP/bfcode-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait --timeout 10m

          echo "Submitting bfcode-client for notarization..."
          xcrun notarytool submit "$RUNNER_TEMP/client-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait --timeout 10m

          # Staple (may not work for standalone CLI binaries, that's OK)
          xcrun stapler staple "$BFCODE" 2>/dev/null || echo "Staple skipped for CLI binary"
          xcrun stapler staple "$CLIENT" 2>/dev/null || echo "Staple skipped for CLI binary"

      # ── Package: sign first, then zip (only zips are kept) ────────────
      - name: Package binaries as zip
        run: |
          mkdir -p dist/staging
          cp cli/target/${{ matrix.target }}/release/bfcode dist/staging/${{ matrix.artifact }}
          chmod +x dist/staging/${{ matrix.artifact }}
          cp cli/target/${{ matrix.target }}/release/bfcode-client dist/staging/${{ matrix.client_artifact }}
          chmod +x dist/staging/${{ matrix.client_artifact }}

          cd dist/staging
          zip "../${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
          zip "../${{ matrix.client_artifact }}.zip" "${{ matrix.client_artifact }}"
          rm -rf ../staging

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

      - name: Upload client artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.client_artifact }}
          path: dist/${{ matrix.client_artifact }}.zip

      # ── Cleanup keychain ──────────────────────────────────────────────
      - name: Cleanup keychain
        if: runner.os == 'macOS' && always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/cert.p12"

  build-gui:
    name: Build GUI (LÖVE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .love package
        uses: love-actions/love-actions-core@v1
        with:
          build-list: gui
          package-path: ${{ github.workspace }}/bfcode-gui.love

      - name: Build Windows
        uses: love-actions/love-actions-windows@v1
        with:
          love-package: ${{ github.workspace }}/bfcode-gui.love
          app-name: "bfcode-gui"
          version-string: ${{ github.ref_name }}
          output-folder: ${{ github.workspace }}/release-gui

      - name: Build Linux AppImage
        uses: love-actions/love-actions-linux@v2
        with:
          love-package: ${{ github.workspace }}/bfcode-gui.love
          app-name: "bfcode-gui"
          version-string: ${{ github.ref_name }}
          output-folder: ${{ github.workspace }}/release-gui

      - name: Build macOS (portable)
        uses: love-actions/love-actions-macos-portable@v1
        with:
          love-package: ${{ github.workspace }}/bfcode-gui.love
          app-name: "bfcode-gui"
          version-string: ${{ github.ref_name }}
          output-folder: ${{ github.workspace }}/release-gui

      - name: Upload .love artifact
        uses: actions/upload-artifact@v4
        with:
          name: bfcode-gui-love
          path: ${{ github.workspace }}/bfcode-gui.love

      - name: Upload GUI distributables
        uses: actions/upload-artifact@v4
        with:
          name: bfcode-gui-distributables
          path: ${{ github.workspace }}/release-gui/

  release:
    name: Create Release
    needs: [build, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*

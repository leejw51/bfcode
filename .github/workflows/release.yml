name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        working-directory: cli
        run: cargo test

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: bfcode-linux-amd64
            client_artifact: bfcode_client-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: bfcode-linux-arm64
            client_artifact: bfcode_client-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: bfcode-darwin-amd64
            client_artifact: bfcode_client-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: bfcode-darwin-arm64
            client_artifact: bfcode_client-darwin-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build release
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      # ── macOS: Sign & Notarize bfcode ─────────────────────────────────
      - name: Sign & Notarize bfcode
        if: runner.os == 'macOS'
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: cli/target/${{ matrix.target }}/release/bfcode
          p12_file: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          p12_password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          notarize: true
          apple_id: ${{ secrets.APPLE_ID }}
          apple_password: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          team_id: ${{ secrets.TEAM_ID }}

      - name: Sign & Notarize bfcode-client
        if: runner.os == 'macOS'
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: cli/target/${{ matrix.target }}/release/bfcode-client
          p12_file: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          p12_password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          notarize: true
          apple_id: ${{ secrets.APPLE_ID }}
          apple_password: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          team_id: ${{ secrets.TEAM_ID }}

      # ── Package: sign first, then zip ─────────────────────────────────
      - name: Package binaries as zip
        run: |
          mkdir -p dist
          cp cli/target/${{ matrix.target }}/release/bfcode dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}
          cp cli/target/${{ matrix.target }}/release/bfcode-client dist/${{ matrix.client_artifact }}
          chmod +x dist/${{ matrix.client_artifact }}

          cd dist
          zip "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
          zip "${{ matrix.client_artifact }}.zip" "${{ matrix.client_artifact }}"

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

      - name: Upload client artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.client_artifact }}
          path: dist/${{ matrix.client_artifact }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done
          cd release
          sha256sum *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        working-directory: cli
        run: cargo test

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: test
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: bfcode-darwin-amd64
            client_artifact: bfcode_client-darwin-amd64
          - target: aarch64-apple-darwin
            artifact: bfcode-darwin-arm64
            client_artifact: bfcode_client-darwin-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build release
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      # ── Import certificate ────────────────────────────────────────────
      - name: Import codesigning certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          CERT_INFO=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" || true)
          if [ -n "$CERT_INFO" ]; then
            CERT_ID=$(echo "$CERT_INFO" | head -1 | awk -F'"' '{print $2}')
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV
            echo "Found certificate: $CERT_ID"
          else
            echo "::warning::No Developer ID Application certificate found, using ad-hoc signing"
            echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV
          fi

      # ── Sign binaries ────────────────────────────────────────────────
      - name: Codesign macOS binaries
        run: |
          BFCODE="cli/target/${{ matrix.target }}/release/bfcode"
          CLIENT="cli/target/${{ matrix.target }}/release/bfcode-client"

          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            "$BFCODE"

          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            "$CLIENT"

          echo "Signed bfcode:"
          codesign -dv --verbose=2 "$BFCODE" 2>&1 | head -5
          echo "Signed bfcode-client:"
          codesign -dv --verbose=2 "$CLIENT" 2>&1 | head -5

      # ── Notarize binaries ────────────────────────────────────────────
      - name: Notarize macOS binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          BFCODE="cli/target/${{ matrix.target }}/release/bfcode"
          CLIENT="cli/target/${{ matrix.target }}/release/bfcode-client"

          ditto -c -k "$BFCODE" "$RUNNER_TEMP/bfcode-notarize.zip"
          ditto -c -k "$CLIENT" "$RUNNER_TEMP/client-notarize.zip"

          echo "Submitting bfcode for notarization..."
          xcrun notarytool submit "$RUNNER_TEMP/bfcode-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait --timeout 10m

          echo "Submitting bfcode-client for notarization..."
          xcrun notarytool submit "$RUNNER_TEMP/client-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait --timeout 10m

          xcrun stapler staple "$BFCODE" 2>/dev/null || echo "Staple skipped for CLI binary"
          xcrun stapler staple "$CLIENT" 2>/dev/null || echo "Staple skipped for CLI binary"

      # ── Package as zip ───────────────────────────────────────────────
      - name: Package binaries as zip
        run: |
          mkdir -p dist/staging
          cp cli/target/${{ matrix.target }}/release/bfcode dist/staging/${{ matrix.artifact }}
          chmod +x dist/staging/${{ matrix.artifact }}
          cp cli/target/${{ matrix.target }}/release/bfcode-client dist/staging/${{ matrix.client_artifact }}
          chmod +x dist/staging/${{ matrix.client_artifact }}

          cd dist/staging
          zip "../${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
          zip "../${{ matrix.client_artifact }}.zip" "${{ matrix.client_artifact }}"
          rm -rf ../staging

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

      - name: Upload client artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.client_artifact }}
          path: dist/${{ matrix.client_artifact }}.zip

      # ── Cleanup keychain ─────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/cert.p12"

  build-gui:
    name: Build GUI (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build .love package ──────────────────────────────────────────
      - name: Build .love package
        run: |
          cd gui
          zip -9 -r ../bfcode-gui.love . \
            -x "build/*" -x ".*" -x "Makefile" -x "*.py" \
            -x "generated_images/*" -x "__pycache__/*" -x "README.md"

      # ── Generate .icns icon ──────────────────────────────────────────
      - name: Generate macOS icon
        run: |
          SRC="gui/assets/icon.png"
          # Convert source to actual PNG format first
          sips -s format png "$SRC" --out source_icon.png
          mkdir -p icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -s format png -z $size $size source_icon.png --out "icon.iconset/icon_${size}x${size}.png"
          done
          for size in 16 32 128 256; do
            double=$((size * 2))
            cp "icon.iconset/icon_${double}x${double}.png" "icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns icon.iconset -o icon.icns

      # ── Download official LÖVE and embed game ────────────────────────
      - name: Package macOS app
        run: |
          curl -L -o love-macos.zip \
            "https://github.com/love2d/love/releases/download/11.5/love-11.5-macos.zip"
          unzip love-macos.zip -d love-macos
          APP="love-macos/love.app"
          cp bfcode-gui.love "$APP/Contents/Resources/game.love"
          plutil -replace CFBundleName -string "bfcode-gui" "$APP/Contents/Info.plist"
          plutil -replace CFBundleExecutable -string "love" "$APP/Contents/Info.plist"
          plutil -replace CFBundleIdentifier -string "com.bfcode.gui" "$APP/Contents/Info.plist"
          plutil -replace CFBundleShortVersionString -string "${{ github.ref_name }}" "$APP/Contents/Info.plist"
          # Replace icon
          cp icon.icns "$APP/Contents/Resources/OS X AppIcon.icns" 2>/dev/null || \
          cp icon.icns "$APP/Contents/Resources/Love.icns" 2>/dev/null || true
          mv "$APP" "love-macos/bfcode-gui.app"

      # ── Import certificate ────────────────────────────────────────────
      - name: Import codesigning certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          CERT_INFO=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" || true)
          if [ -n "$CERT_INFO" ]; then
            CERT_ID=$(echo "$CERT_INFO" | head -1 | awk -F'"' '{print $2}')
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV
          else
            echo "::warning::No Developer ID Application certificate found, using ad-hoc signing"
            echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV
          fi

      # ── Create entitlements for LuaJIT ─────────────────────────────────
      - name: Create entitlements
        run: |
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.allow-jit bool true" entitlements.plist
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.allow-unsigned-executable-memory bool true" entitlements.plist
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.disable-library-validation bool true" entitlements.plist
          echo "Entitlements:"
          cat entitlements.plist

      # ── Sign the .app bundle (frameworks first, then app) ─────────────
      - name: Codesign macOS app
        run: |
          APP="love-macos/bfcode-gui.app"

          # Sign all Mach-O binaries inside frameworks
          find "$APP/Contents/Frameworks" -type f | while read f; do
            if file "$f" | grep -q "Mach-O"; then
              echo "Signing: $f"
              codesign --force --options runtime \
                --sign "$APPLE_SIGNING_IDENTITY" \
                --entitlements entitlements.plist \
                --timestamp "$f"
            fi
          done

          # Sign framework bundles
          find "$APP/Contents/Frameworks" -name "*.framework" -maxdepth 1 | while read f; do
            echo "Signing framework: $f"
            codesign --force --options runtime \
              --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements entitlements.plist \
              --timestamp "$f"
          done

          # Sign the main executable
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements entitlements.plist \
            --timestamp "$APP/Contents/MacOS/love"

          # Sign the outer app bundle
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements entitlements.plist \
            --timestamp "$APP"

          echo "Signed bfcode-gui.app:"
          codesign -dv --verbose=2 "$APP" 2>&1 | head -5
          echo "Checking entitlements:"
          codesign -d --entitlements - "$APP" 2>&1 | head -20
          echo "Verifying signature..."
          codesign --verify --deep --strict "$APP"

      # ── Notarize ──────────────────────────────────────────────────────
      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "love-macos/bfcode-gui.app" "$RUNNER_TEMP/bfcode-gui-notarize.zip"
          echo "Submitting bfcode-gui.app for notarization..."
          xcrun notarytool submit "$RUNNER_TEMP/bfcode-gui-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait --timeout 10m
          xcrun stapler staple "love-macos/bfcode-gui.app"

      # ── Package as zip ────────────────────────────────────────────────
      - name: Package macOS zip
        run: |
          mkdir -p release-gui
          cd love-macos
          ditto -c -k --sequesterRsrc --keepParent bfcode-gui.app ../release-gui/bfcode-gui-macos.zip

      - name: Upload .love artifact
        uses: actions/upload-artifact@v4
        with:
          name: bfcode-gui-love
          path: bfcode-gui.love

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: bfcode-gui-macos
          path: ./release-gui/

      # ── Cleanup keychain ──────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/cert.p12"

  release:
    name: Create Release
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
